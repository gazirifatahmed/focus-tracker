name: focus_track
description: "A NoFap habit tracker app with streak counting, badges, and progress tracking."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.0
  cloud_firestore: ^5.4.0
  provider: ^6.1.2
  intl: ^0.19.0
  flutter_local_notifications: ^18.0.1
  permission_handler: ^11.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/icon/app_icon.png
    - assets/badges/clown.png
    - assets/badges/noob.png
    - assets/badges/novice.png
    - assets/badges/average.png
    - assets/badges/advanced.png
    - assets/badges/sigma.png
    - assets/badges/chad.png
    - assets/badges/absolute_chad.png
    - assets/badges/giga_chad.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"